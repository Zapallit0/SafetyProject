<!doctype html>
<html lang="es-PE">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Fallback title/description for no-JS; per-route values are set by react-helmet-async (see src/Components/Helpers/Seo.jsx). -->
    <title>Safety Advisors | Seguridad y Salud Ocupacional en Lima, Perú</title>
    <meta name="author" content="JVQDeveloper">
    <meta name="robots" content="index, follow">

    <!-- Local SEO (Lima, Perú) -->
    <meta name="geo.region" content="PE-LIM">
    <meta name="geo.placename" content="Lima, Perú">

    <!-- Constant Open Graph / Twitter tags (title, description & url are set per-route by Helmet) -->
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://safetyadvisors.io/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:site_name" content="Safety Advisors">
    <meta property="og:locale" content="es_PE">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://safetyadvisors.io/og-image.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" href="/LogoHome.svg">
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
